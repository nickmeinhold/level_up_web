name: level_up_web
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.2

dependencies:
  chewie: ^1.11.3
  cloud_firestore: ^5.6.6
  cloud_functions: ^5.5.0
  firebase_auth: ^5.5.2
  firebase_core: ^3.13.0
  flutter:
    sdk: flutter
  go_router: ^15.0.0
  http: ^1.3.0
  level_up_shared:
    path: ../level_up_shared
  url_launcher: ^6.3.1
  video_player: ^2.9.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: false
  ios: false
  web:
    generate: true
    image_path: "assets/icons/icon.png"
  # Run: dart run flutter_launcher_icons:main
